# ============================================================
#  docker-compose.yml
#
#  Spins up Seq (the log server) so you can run the API
#  and see logs immediately without any cloud account.
#
#  Usage:
#    docker-compose up -d        ← start Seq in background
#    docker-compose down         ← stop and remove containers
#    docker-compose down -v      ← also delete stored log data
# ============================================================

services:

  seq:
    image: datalust/seq:latest

    # Seq needs ACCEPT_EULA=Y to start (licence agreement).
    environment:
      - ACCEPT_EULA=Y

      # Set an initial admin password.
      # Change this for any non-local environment!
      - SEQ_FIRSTRUN_ADMINPASSWORD=Admin1234!

    ports:
      # 5341 → Seq ingestion API  (where your app POSTs logs)
      - "5341:5341"
      # 8080 → Seq web UI         (open http://localhost:8080)
      - "8080:80"

    volumes:
      # Persist log data between container restarts.
      - seq-data:/data

    restart: unless-stopped

volumes:
  seq-data:
